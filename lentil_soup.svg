<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#100a00"/><stop offset="100%" stop-color="#1e1200"/></linearGradient>
    <linearGradient id="soup" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4800a"/><stop offset="100%" stop-color="#8a4800"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="260" rx="130" ry="18" fill="rgba(0,0,0,0.4)"/>
  <path d="M75 210 Q75 268 200 268 Q325 268 325 210 Z" fill="#c8b898"/>
  <ellipse cx="200" cy="208" rx="126" ry="28" fill="#e0cca8"/>
  <ellipse cx="200" cy="204" rx="118" ry="22" fill="#f0ddb8"/>
  <!-- lentil soup -->
  <ellipse cx="200" cy="204" rx="112" ry="20" fill="url(#soup)" filter="url(#glow)"/>
  <!-- swirl pattern -->
  <path d="M170 202 Q185 196 200 202 Q215 208 230 202" fill="none" stroke="#f09020" stroke-width="2.5" opacity="0.5"/>
  <!-- cumin seeds floating -->
  <ellipse cx="155" cy="200" rx="4" ry="2" fill="#4a2800" opacity="0.7"/>
  <ellipse cx="175" cy="203" rx="4" ry="2" fill="#4a2800" opacity="0.7"/>
  <ellipse cx="225" cy="199" rx="4" ry="2" fill="#4a2800" opacity="0.7"/>
  <ellipse cx="245" cy="202" rx="4" ry="2" fill="#4a2800" opacity="0.7"/>
  <!-- lemon slice -->
  <circle cx="235" cy="200" r="14" fill="#e8e040" opacity="0.8"/>
  <path d="M235 186 L235 214 M221 200 L249 200" stroke="#c8c020" stroke-width="1"/>
  <!-- olive oil drizzle -->
  <path d="M155 196 Q180 190 200 196" fill="none" stroke="#f0c040" stroke-width="2" opacity="0.6"/>
  <!-- steam -->
  <path d="M185 175 Q190 155 183 142" fill="none" stroke="rgba(255,180,80,0.3)" stroke-width="3"/>
  <path d="M210 170 Q215 150 208 137" fill="none" stroke="rgba(255,180,80,0.25)" stroke-width="3"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="15" fill="#c9953a">شوربة العدس</text>
</svg>
