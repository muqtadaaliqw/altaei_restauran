<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e08"/><stop offset="100%" stop-color="#141e0a"/></linearGradient>
    <linearGradient id="soup" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8a7820"/><stop offset="100%" stop-color="#5a4a10"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="260" rx="130" ry="18" fill="rgba(0,0,0,0.4)"/>
  <path d="M75 210 Q75 268 200 268 Q325 268 325 210 Z" fill="#c8b898"/>
  <ellipse cx="200" cy="208" rx="126" ry="28" fill="#e0cca8"/>
  <ellipse cx="200" cy="204" rx="118" ry="22" fill="#f0ddb8"/>
  <!-- freekeh soup (greenish brown) -->
  <ellipse cx="200" cy="204" rx="112" ry="20" fill="url(#soup)" filter="url(#glow)"/>
  <!-- freekeh grains texture -->
  <ellipse cx="165" cy="200" rx="3" ry="5" fill="#6a5818" opacity="0.6" transform="rotate(20,165,200)"/>
  <ellipse cx="185" cy="197" rx="3" ry="5" fill="#6a5818" opacity="0.6" transform="rotate(-10,185,197)"/>
  <ellipse cx="205" cy="201" rx="3" ry="5" fill="#6a5818" opacity="0.6" transform="rotate(15,205,201)"/>
  <ellipse cx="225" cy="198" rx="3" ry="5" fill="#6a5818" opacity="0.6" transform="rotate(-20,225,198)"/>
  <ellipse cx="240" cy="202" rx="3" ry="5" fill="#6a5818" opacity="0.6" transform="rotate(5)"/>
  <!-- chicken piece visible -->
  <ellipse cx="190" cy="202" rx="18" ry="10" fill="#c89030" opacity="0.8"/>
  <!-- herbs -->
  <circle cx="230" cy="197" r="5" fill="#4aaa20" opacity="0.7"/>
  <circle cx="155" cy="200" r="4" fill="#4aaa20" opacity="0.7"/>
  <!-- steam -->
  <path d="M188 175 Q193 155 186 142" fill="none" stroke="rgba(180,200,100,0.3)" stroke-width="3"/>
  <path d="M212 170 Q217 150 210 137" fill="none" stroke="rgba(180,200,100,0.25)" stroke-width="3"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="15" fill="#c9953a">شوربة الفريكة</text>
</svg>
