<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#080e05"/><stop offset="100%" stop-color="#101a08"/></linearGradient>
    <linearGradient id="juice" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88cc20"/><stop offset="100%" stop-color="#448800"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="268" rx="55" ry="9" fill="rgba(0,0,0,0.4)"/>
  <path d="M162 110 L150 260 Q200 275 250 260 L238 110 Z" fill="url(#juice)" filter="url(#glow)"/>
  <path d="M162 110 L150 260 Q200 275 250 260 L238 110 Z" fill="rgba(255,255,255,0.07)"/>
  <!-- ice -->
  <rect x="172" y="160" width="25" height="25" rx="5" fill="rgba(255,255,255,0.35)" transform="rotate(8)"/>
  <rect x="208" y="175" width="22" height="22" rx="5" fill="rgba(255,255,255,0.3)" transform="rotate(-6)"/>
  <!-- apple slice on rim -->
  <path d="M238 112 Q255 95 272 112 Q268 135 255 140 Q242 135 238 112 Z" fill="#88dd30"/>
  <path d="M255 140 L255 112" stroke="#66aa18" stroke-width="1.5"/>
  <circle cx="255" cy="95" r="3" fill="#5a3010"/>
  <!-- glass rim -->
  <ellipse cx="200" cy="112" rx="38" ry="7" fill="rgba(255,255,255,0.2)"/>
  <path d="M166 122 L162 240" stroke="rgba(255,255,255,0.15)" stroke-width="7" stroke-linecap="round"/>
  <!-- straw -->
  <rect x="220" y="88" width="7" height="135" rx="3.5" fill="#ffaa40" opacity="0.8" transform="rotate(3,220,88)"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="14" fill="#c9953a">عصير تفاح طازج</text>
</svg>
