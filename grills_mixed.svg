<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d0a0a"/>
      <stop offset="100%" stop-color="#4a1510"/>
    </linearGradient>
    <linearGradient id="meat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B2500"/>
      <stop offset="100%" stop-color="#5C1500"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- grill lines glow -->
  <rect x="0" y="230" width="400" height="70" fill="#1a0505"/>
  <!-- fire glow -->
  <ellipse cx="200" cy="235" rx="180" ry="20" fill="#ff4500" opacity="0.3" filter="url(#glow)"/>
  <!-- grill bars -->
  <line x1="60" y1="220" x2="340" y2="220" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="60" y1="234" x2="340" y2="234" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <line x1="60" y1="248" x2="340" y2="248" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  <!-- meat pieces -->
  <rect x="80" y="175" width="70" height="48" rx="10" fill="url(#meat)" filter="url(#glow)"/>
  <rect x="85" y="182" width="60" height="8" rx="3" fill="#a03020" opacity="0.5"/>
  <rect x="85" y="198" width="60" height="8" rx="3" fill="#a03020" opacity="0.5"/>
  <rect x="160" y="168" width="80" height="52" rx="10" fill="#7a2010" filter="url(#glow)"/>
  <rect x="165" y="176" width="70" height="8" rx="3" fill="#a03020" opacity="0.5"/>
  <rect x="165" y="194" width="70" height="8" rx="3" fill="#a03020" opacity="0.5"/>
  <rect x="260" y="178" width="65" height="44" rx="10" fill="#8B2500" filter="url(#glow)"/>
  <!-- smoke wisps -->
  <path d="M130 165 Q135 145 128 130" fill="none" stroke="rgba(200,200,200,0.3)" stroke-width="3"/>
  <path d="M200 158 Q205 135 198 120" fill="none" stroke="rgba(200,200,200,0.25)" stroke-width="3"/>
  <!-- spice dots -->
  <circle cx="100" cy="187" r="2" fill="#c9953a"/>
  <circle cx="115" cy="195" r="2" fill="#c9953a"/>
  <circle cx="180" cy="182" r="2" fill="#c9953a"/>
  <!-- label -->
  <text x="200" y="285" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="16" fill="#c9953a">مشاوي مشكّلة</text>
</svg>
