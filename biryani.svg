<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d0808"/><stop offset="100%" stop-color="#1a0f00"/></linearGradient>
    <linearGradient id="rice" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8c060"/><stop offset="50%" stop-color="#f5d878"/><stop offset="100%" stop-color="#c8980a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <ellipse cx="200" cy="222" rx="172" ry="58" fill="#c8b870"/>
  <ellipse cx="200" cy="215" rx="162" ry="50" fill="#ddc878"/>
  <!-- biryani mound -->
  <ellipse cx="200" cy="205" rx="148" ry="50" fill="url(#rice)" filter="url(#glow)"/>
  <!-- coloured rice streaks (orange,yellow,white) -->
  <path d="M155 195 Q175 188 200 193 Q225 198 250 193" fill="none" stroke="#ff8c00" stroke-width="4" opacity="0.5"/>
  <path d="M160 208 Q185 202 210 207 Q230 212 248 207" fill="none" stroke="#fff8e1" stroke-width="3" opacity="0.4"/>
  <!-- chicken pieces -->
  <ellipse cx="170" cy="200" rx="22" ry="14" fill="#b87020"/>
  <ellipse cx="230" cy="198" rx="22" ry="14" fill="#a86010"/>
  <!-- mint leaves -->
  <ellipse cx="200" cy="188" rx="18" ry="9" fill="#3a8a20" opacity="0.8"/>
  <ellipse cx="153" cy="210" rx="12" ry="6" fill="#4a9a28" opacity="0.7"/>
  <!-- fried onions (dark golden) -->
  <ellipse cx="245" cy="212" rx="20" ry="8" fill="#c87820" opacity="0.8"/>
  <!-- steam -->
  <path d="M190 162 Q196 142 189 128" fill="none" stroke="rgba(255,220,100,0.3)" stroke-width="3"/>
  <path d="M212 158 Q218 138 211 124" fill="none" stroke="rgba(255,220,100,0.25)" stroke-width="3"/>
  <text x="200" y="292" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="15" fill="#c9953a">برياني عراقي</text>
</svg>
