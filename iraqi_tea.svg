<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d0808"/><stop offset="100%" stop-color="#1a1000"/></linearGradient>
    <linearGradient id="tea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c85020"/><stop offset="100%" stop-color="#7a2808"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- istikan (Iraqi tea glass) shadow -->
  <ellipse cx="200" cy="270" rx="38" ry="8" fill="rgba(0,0,0,0.5)"/>
  <!-- saucer -->
  <ellipse cx="200" cy="260" rx="70" ry="14" fill="#c8a850"/>
  <ellipse cx="200" cy="257" rx="62" ry="11" fill="#daba60"/>
  <!-- istikan glass (hourglass shape) -->
  <path d="M173 155 L168 230 Q200 242 232 230 L227 155 Q200 168 173 155 Z" fill="url(#tea)" filter="url(#glow)"/>
  <!-- glass highlight -->
  <path d="M173 155 L168 230 Q200 242 232 230 L227 155 Q200 168 173 155 Z" fill="rgba(255,255,255,0.07)"/>
  <!-- waist of istikan -->
  <ellipse cx="200" cy="193" rx="28" ry="8" fill="#9a3818" opacity="0.4"/>
  <!-- tea surface -->
  <ellipse cx="200" cy="157" rx="28" ry="7" fill="#dd6030" opacity="0.7"/>
  <!-- glass rim gold -->
  <ellipse cx="200" cy="155" rx="28" ry="7" fill="none" stroke="#d4a830" stroke-width="2"/>
  <ellipse cx="200" cy="230" rx="32" ry="8" fill="none" stroke="#d4a830" stroke-width="2"/>
  <!-- steam -->
  <path d="M190 138 Q195 118 188 105" fill="none" stroke="rgba(255,180,100,0.35)" stroke-width="2.5"/>
  <path d="M210 135 Q215 115 208 102" fill="none" stroke="rgba(255,180,100,0.3)" stroke-width="2.5"/>
  <!-- cardamom pods on saucer -->
  <ellipse cx="155" cy="257" rx="8" ry="5" fill="#6a8a20" transform="rotate(-20,155,257)"/>
  <ellipse cx="248" cy="258" rx="8" ry="5" fill="#6a8a20" transform="rotate(15,248,258)"/>
  <!-- sugar cubes -->
  <rect x="260" y="200" width="18" height="18" rx="3" fill="#f5f0e0"/>
  <rect x="263" y="203" width="12" height="4" rx="1" fill="#e8e0cc" opacity="0.5"/>
  <rect x="263" y="211" width="12" height="4" rx="1" fill="#e8e0cc" opacity="0.5"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="14" fill="#c9953a">شاي عراقي بالهيل</text>
</svg>
