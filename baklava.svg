<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d0800"/><stop offset="100%" stop-color="#1a1000"/></linearGradient>
    <linearGradient id="bak" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c060"/><stop offset="100%" stop-color="#9a7020"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- decorative plate -->
  <ellipse cx="200" cy="258" rx="160" ry="35" fill="#c8a858"/>
  <ellipse cx="200" cy="250" rx="150" ry="28" fill="#daba68"/>
  <!-- baklava pieces (diamond shapes) -->
  <!-- row 1 -->
  <path d="M108 235 L130 210 L152 235 L130 260 Z" fill="url(#bak)" filter="url(#glow)"/>
  <path d="M152 235 L174 210 L196 235 L174 260 Z" fill="#c8a840" filter="url(#glow)"/>
  <path d="M196 235 L218 210 L240 235 L218 260 Z" fill="url(#bak)" filter="url(#glow)"/>
  <path d="M240 235 L262 210 L284 235 L262 260 Z" fill="#c8a840" filter="url(#glow)"/>
  <!-- top pieces row 2 -->
  <path d="M130 210 L152 185 L174 210 L152 235 Z" fill="#daba58"/>
  <path d="M174 210 L196 185 L218 210 L196 235 Z" fill="#e8ca68"/>
  <path d="M218 210 L240 185 L262 210 L240 235 Z" fill="#daba58"/>
  <!-- layer lines on each piece -->
  <line x1="113" y1="235" x2="147" y2="235" stroke="#8a6010" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="228" x2="140" y2="228" stroke="#8a6010" stroke-width="1" opacity="0.5"/>
  <line x1="157" y1="235" x2="191" y2="235" stroke="#8a6010" stroke-width="1" opacity="0.5"/>
  <line x1="201" y1="235" x2="235" y2="235" stroke="#8a6010" stroke-width="1" opacity="0.5"/>
  <line x1="245" y1="235" x2="279" y2="235" stroke="#8a6010" stroke-width="1" opacity="0.5"/>
  <!-- pistachio on each diamond center -->
  <ellipse cx="130" cy="235" rx="7" ry="5" fill="#4a8a18"/>
  <ellipse cx="174" cy="235" rx="7" ry="5" fill="#5a9a22"/>
  <ellipse cx="218" cy="235" rx="7" ry="5" fill="#4a8a18"/>
  <ellipse cx="262" cy="235" rx="7" ry="5" fill="#5a9a22"/>
  <ellipse cx="152" cy="210" rx="7" ry="5" fill="#4a8a18"/>
  <ellipse cx="196" cy="210" rx="7" ry="5" fill="#5a9a22"/>
  <ellipse cx="240" cy="210" rx="7" ry="5" fill="#4a8a18"/>
  <!-- honey shine -->
  <path d="M115 225 Q165 212 215 222 Q258 230 285 218" fill="none" stroke="#f0c020" stroke-width="2" opacity="0.5"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arabic Typesetting,Traditional Arabic,serif" font-size="15" fill="#c9953a">بقلاوة عراقية</text>
</svg>
